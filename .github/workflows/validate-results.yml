name: Validate resources.json

on:
  pull_request:
    paths:
      - "catalog/resources.json"
      - "catalog/taxonomy.json"
      - "scripts/validate-results.mjs"
      - "scripts/description-signals.mjs"
      - ".github/workflows/validate-results.yml"
  push:
    branches:
      - main
    paths:
      - "catalog/resources.json"
      - "catalog/taxonomy.json"
      - "scripts/validate-results.mjs"
      - "scripts/description-signals.mjs"
      - ".github/workflows/validate-results.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: node scripts/validate-results.mjs

